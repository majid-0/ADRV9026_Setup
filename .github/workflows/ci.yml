name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (no pythonnet on Linux runner)
        run: |
          python -m pip install --upgrade pip
          # pythonnet is win32-only per pyproject markers; the .NET boundary is
          # mocked in tests, so hardware-free CI installs cleanly on Linux.
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check src tests
          black --check src tests
      - name: Unit tests (hardware-free)
        run: pytest -m "not hardware" --cov=adrvtrx --cov-report=term-missing
